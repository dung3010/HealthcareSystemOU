{% extends 'layout/base.html' %} 
{% block title %}Đăng ký tài khoản{% endblock %} 

{% block content %}
<div class="wrapper" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="card" style="width: 100%; max-width: 450px; padding: 2.5rem 2rem;">
        <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--accent);">Đăng ký</h2>
        <!-- Hiển thị thông báo lỗi nếu có -->
        {% if err_msg %}
        <div class="notice notice-warn" style="color: var(--danger); margin-bottom: 1rem; text-align: center; border-color: #E8B5B5; background-color: var(--danger-light);">
            {{ err_msg }}
        </div>
        {% endif %}
        
        <form method="post" action="/register" style="display: flex; flex-direction: column; gap: 1rem;">
            <div class="form-group">
                <label class="required">Họ và tên</label>
                <input type="text" name="name" placeholder="Nhập họ và tên..." required>
            </div>
            <div class="form-group">
                <label class="required">Tên đăng nhập</label>
                <input type="text" name="username" placeholder="Nhập tên đăng nhập..." required>
            </div>
            <div class="form-group">
                <label class="required">Mật khẩu</label>
                <input type="password" name="password" placeholder="Nhập mật khẩu..." required>
            </div>
            <div class="form-group">
                <label class="required">Xác nhận mật khẩu</label>
                <input type="password" name="confirm_password" placeholder="Nhập lại mật khẩu..." required>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top: 1rem; width: 100%; justify-content: center">
                Đăng ký ngay
            </button>
        </form>
        
        <!-- Chuyển về Đăng nhập -->
        <div style="text-align: center; margin-top: 1.5rem; font-size: 13px;">
            Đã có tài khoản? <a href="/login" style="color: #2D5F4F; font-weight: 600;">Đăng nhập</a>
        </div>
    </div>
</div>
{% endblock %}
